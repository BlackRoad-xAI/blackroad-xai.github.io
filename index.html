x:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.search{width:100%;padding:10px 14px;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;color:#ddd;font-size:13px;font-family:var(--sg);outline:none;margin-bottom:12px}.search:focus{border-color:#333}.eco-bar{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:6px 0;z-index:98}.eco-bar-inner{display:flex;gap:14px;justify-content:center;padding:0 16px;white-space:nowrap}.eco-bar a{font-family:var(--jb);font-size:.55rem;color:#555;text-decoration:none}.eco-bar a:hover{color:#aaa}@media(max-width:600px){.gs{grid-template-columns:1fr}}</style></head><body><div class="grad-bar"></div><div class="ct"><div class="section"><div class="mk"></div><div class="tt">BlackRoad-xAI</div><div class="st">xAI/Grok integrations and tools</div></div><div class="section"><div class="gs"><div class="card"><div class="sv" id="rc">...</div><div class="sl">Repos</div></div><div class="card"><div class="sv" id="lc">...</div><div class="sl">Languages</div></div><div class="card"><div class="sv" id="sc">...</div><div class="sl">Stars</div></div></div></div><div class="section"><div class="lb">Repositories</div><input class="search" id="q" placeholder="Search BlackRoad-xAI..." oninput="fr()"><div class="card" id="rl"><div style="font-family:var(--jb);font-size:10px;color:#555;padding:8px">Loading...</div></div></div><div class="section" style="text-align:center"><span style="font-size:11px;color:#aaa"><a href="https://github.com/enterprises/blackroad-os" style="color:#aaa;text-decoration:none">BlackRoad OS Enterprise</a> · <a href="https://blackroad.io" style="color:#aaa;text-decoration:none">blackroad.io</a></span></div></div><div class="grad-bar" style="margin-top:24px"></div><div class="eco-bar"><div class="eco-bar-inner"><a href="https://blackroad.io">Home</a><a href="https://search.blackroad.io">Search</a><a href="https://chat.blackroad.io">Chat</a><a href="https://blackroadai.com">AI</a><a href="https://blackroad.company">Company</a><a href="https://map.blackroad.io">Map</a><a href="https://github.com/enterprises/blackroad-os">Enterprise</a></div></div><div style="height:32px"></div><script>var ar=[];async function lr(){var p=1,a=[];while(true){try{var r=await fetch("https://api.github.com/orgs/BlackRoad-xAI/repos?per_page=100&sort=updated&page="+p);if(!r.ok)break;var d=await r.json();if(!d.length)break;a=a.concat(d);if(d.length<100)break;p++;}catch(e){break;}}ar=a;document.getElementById("rc").textContent=a.length;var l=new Set(),s=0;a.forEach(function(r){if(r.language)l.add(r.language);s+=r.stargazers_count||0;});document.getElementById("lc").textContent=l.size;document.getElementById("sc").textContent=s;rr(a);}function rr(repos){document.getElementById("rl").innerHTML=repos.slice(0,60).map(function(r){var d=r.description||"";if(d.length>60)d=d.slice(0,57)+"...";return "<a href=\""+r.html_url+"\" target=\"_blank\" class=\"repo-item\"><span class=\"dot\"></span><span class=\"repo-name\">"+r.name+"</span><span class=\"repo-desc\">"+d+"</span></a>";}).join("")||"<div style=\"font-family:var(--jb);font-size:10px;color:#555;padding:8px\">No public repos yet</div>";}function fr(){var q=document.getElementById("q").value.toLowerCase();rr(ar.filter(function(r){return r.name.toLowerCase().includes(q)||(r.description||"").toLowerCase().includes(q);}));}lr();</script></body></html>
